services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: charming-backend
    volumes:
      - ${DATA_DIR:-./data}:/data
    environment:
      - CHARMING_HOME=/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    # No host port exposed — only accessible via internal network + nginx

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: charming-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
